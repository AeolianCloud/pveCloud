# 应用配置文件
# 该文件包含系统运行所需的各种配置参数

# 应用环境设置
# local: 本地开发环境
# production: 生产环境
app_env: local

# 服务监听地址配置
# 公共API服务地址，供普通用户访问
public_api_addr: ":8080"

# 管理员API服务地址，供管理员操作
admin_api_addr: ":8081"

# 工作进程服务地址，用于内部任务处理
worker_addr: ":8082"

# 数据库配置
# MySQL数据库连接字符串
# 格式: 用户名:密码@tcp(主机:端口)/数据库名?参数
mysql_dsn: pvecloud:yEZw7ESny6hBGPrh@tcp(114.66.50.54:3306)/pvecloud?parseTime=true&loc=Local

# Redis服务器地址
# 格式: 主机:端口
redis_addr: 114.66.50.54:6379

# JWT密钥配置
# Web端用户认证JWT密钥，生产环境应使用强密钥并保密
jwt_web_secret: change-me-web

# 管理员认证JWT密钥，生产环境应使用强密钥并保密
jwt_admin_secret: change-me-admin

# 支付相关配置
payment:
  # 支付提供商
  # mock: 模拟支付（用于测试）
  # 其他可选值根据实际集成的支付服务而定
  provider: mock
  
  # 支付回调基础URL
  # 支付服务回调通知的基础地址
  callback_base_url: http://127.0.0.1:8080
  
  # 支付通知路径
  # 支付服务回调通知的具体路径
  notify_path: /payments/callback
  
  # 商户ID
  # 支付服务分配的商户标识
  merchant_id: demo-merchant
  
  # 商户密钥
  # 支付服务分配的商户密钥，用于签名验证
  merchant_secret: demo-merchant-secret

# 资源管理配置
resource:
  # 资源提供商
  # mock: 模拟资源管理（用于测试）
  # 其他可选值根据实际集成的资源服务而定
  provider: mock
  
  # 资源API端点
  # 资源管理服务的API地址
  api_endpoint: http://127.0.0.1:9000
  
  # 资源API令牌
  # 访问资源管理服务的认证令牌
  api_token: demo-resource-token

# 工作进程配置
worker:
  # 轮询间隔
  # 工作进程轮询任务的时间间隔
  poll_interval: 5s
  
  # 批处理大小
  # 每次处理的任务数量
  batch_size: 20
