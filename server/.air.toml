root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/api.exe ./cmd/api"
bin = "./tmp/api.exe"
full_bin = "./tmp/api.exe -config config.yaml"
include_ext = ["go", "yaml", "yml"]
include_dir = ["cmd", "internal", "../docs/server/api"]
exclude_dir = ["tmp", "bin", ".cache"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = 500

[log]
time = true

[misc]
clean_on_exit = true
