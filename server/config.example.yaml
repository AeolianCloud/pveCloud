# 应用基础配置。
app:
  # 应用名称，用于日志、审计和后续运维标识。
  name: pveCloud
  # 当前运行环境；本地开发使用 local，部署环境可按实际环境命名。
  env: local
  # API HTTP 监听地址；":8080" 表示监听本机所有网卡的 8080 端口。
  addr: ":8080"
  # API 收到退出信号后的优雅关闭等待时间，单位为秒。
  shutdown_timeout_seconds: 10

# MariaDB 连接和连接池配置。
database:
  # MariaDB 主机地址；本地开发通常为 127.0.0.1。
  host: 127.0.0.1
  # MariaDB 监听端口。
  port: 3306
  # 业务数据库名称。
  name: pvecloud
  # 业务数据库用户名；不要在示例配置中写入真实生产账号。
  user: pvecloud
  # 业务数据库密码；真实配置写入 server/config.yaml，并保持不提交。
  password: change_me
  # 数据库连接字符集；需要支持完整 Unicode 时使用 utf8mb4。
  charset: utf8mb4
  # 是否把 MariaDB 时间字段解析为 Go time.Time。
  parse_time: true
  # 数据库时间解析使用的时区；Local 表示使用进程本地时区。
  loc: Local
  # 数据库连接池最大打开连接数。
  max_open_conns: 25
  # 数据库连接池最大空闲连接数。
  max_idle_conns: 10
  # 单个数据库连接可复用的最长时间，单位为分钟。
  conn_max_lifetime_minutes: 60

# Redis 连接配置，用于缓存、限流、短 TTL 状态、验证码、一次性 token 和幂等短锁；API 和 Worker 启动时必须可连接。
redis:
  # Redis 地址；本地开发通常为 127.0.0.1:6379。
  addr: 127.0.0.1:6379
  # Redis 密码；无密码时留空，真实密码只写入 server/config.yaml。
  password: ""
  # Redis 逻辑库编号。
  db: 0
  # 业务 key 前缀，所有 Redis key 必须带此前缀，避免同一 Redis 被多个应用共用时互相污染。
  key_prefix: pvecloud:

# 用户端和管理端 JWT 配置。
jwt:
  # 用户端 JWT 签名密钥；生产环境必须替换为高强度随机值。
  user_secret: change_me_user_secret
  # 管理端 JWT 签名密钥；应与用户端密钥分离。
  admin_secret: change_me_admin_secret
  # 用户端 JWT issuer，用于区分 token 来源。
  user_issuer: pvecloud-user
  # 管理端 JWT issuer，用于区分 token 来源。
  admin_issuer: pvecloud-admin
  # 用户端 access token 有效期，单位为分钟。
  user_expire_minutes: 1440
  # 管理端 access token 有效期，单位为分钟。
  admin_expire_minutes: 480

# Worker 异步任务进程配置。
worker:
  # Worker 实例标识；多实例部署时应保持唯一，便于日志和锁归属排查。
  id: local-worker-1
  # Worker 轮询待处理任务的间隔，单位为秒。
  poll_interval_seconds: 5
  # Worker 抢占任务后的锁定有效期，单位为秒。
  lock_ttl_seconds: 60
  # Worker 单轮最多拉取的任务数量。
  batch_size: 10

# OpenAPI 文档加载和公开配置。
openapi:
  # 是否通过 API 进程公开 OpenAPI YAML。
  enabled: true
  # OpenAPI YAML 路径；相对路径以 server/ 运行目录为基准。
  spec_path: ../docs/server/api/openapi.yaml

# 日志配置。
log:
  # 日志级别；本地开发可使用 debug，部署环境建议使用 info 或 warn。
  level: debug
