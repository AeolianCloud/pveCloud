    AdminSessionSummary:
      type: object
      required:
        - session_id
        - issued_at
        - expires_at
      properties:
        session_id:
          type: string
          description: 管理端会话 ID，对应 JWT jti
          example: adm_01HZ9H5QJ8P7Z7YH4ZK3F1V8BA
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
