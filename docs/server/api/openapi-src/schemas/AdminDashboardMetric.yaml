    AdminDashboardMetric:
      type: object
      required:
        - key
        - title
        - value
      properties:
        key:
          type: string
          example: active_instances
        title:
          type: string
          example: 运行中实例
        value:
          type: integer
          example: 0
        unit:
          type: string
          nullable: true
          example: 台
