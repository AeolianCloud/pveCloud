    AdminLoginData:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
        - admin
        - role_ids
        - permission_codes
        - session
      properties:
        access_token:
          type: string
          description: 管理端 JWT
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: token 有效秒数
          example: 28800
        admin:
          $ref: "#/components/schemas/AdminSummary"
        role_ids:
          type: array
          items:
            type: integer
            format: int64
          example:
            - 1
        permission_codes:
          type: array
          items:
            type: string
          example:
            - dashboard:view
            - user:view
        session:
          $ref: "#/components/schemas/AdminSessionSummary"
