    AdminAuthStateData:
      type: object
      required:
        - admin
        - role_ids
        - permission_codes
        - menus
        - session
      properties:
        admin:
          $ref: "#/components/schemas/AdminSummary"
        role_ids:
          type: array
          items:
            type: integer
            format: int64
          example:
            - 1
        permission_codes:
          type: array
          items:
            type: string
          example:
            - dashboard:view
            - user:view
        menus:
          type: array
          items:
            $ref: "#/components/schemas/AdminMenuItem"
        session:
          $ref: "#/components/schemas/AdminSessionSummary"
