    AdminLoginCaptchaData:
      type: object
      required:
        - captcha_id
        - image
        - expires_in
      properties:
        captcha_id:
          type: string
          description: 验证码标识，提交登录时原样传入 captcha_id
          example: "adm_captcha_01HZY4ZS6K0SPZ92XP9E9W0D7A"
        image:
          type: string
          description: 验证码图片 data URL，前端直接赋值给 img src
          example: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjwvc3ZnPg=="
        expires_in:
          type: integer
          description: 验证码剩余有效秒数
          example: 120
