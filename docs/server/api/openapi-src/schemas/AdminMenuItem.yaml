    AdminMenuItem:
      type: object
      required:
        - key
        - title
        - path
      properties:
        key:
          type: string
          example: dashboard
        title:
          type: string
          example: 首页
        path:
          type: string
          example: /dashboard
        icon:
          type: string
          nullable: true
          example: layout-dashboard
        permission_code:
          type: string
          nullable: true
          example: dashboard:view
        children:
          type: array
          items:
            $ref: "#/components/schemas/AdminMenuItem"
