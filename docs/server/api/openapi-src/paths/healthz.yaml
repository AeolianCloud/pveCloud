  /healthz:
    get:
      tags:
        - system
      summary: 服务健康检查
      operationId: getHealthz
      responses:
        "200":
          description: 服务和数据库可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          description: 服务或数据库不可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
