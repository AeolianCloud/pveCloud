  /admin-api/auth/refresh:
    post:
      tags:
        - admin-auth
      summary: 刷新管理端访问令牌
      operationId: postAdminAuthRefresh
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          description: 已轮换新 token，旧会话同时吊销
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: 未登录、token 无效、token 已吊销或 token 过期
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 管理员账号已禁用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
