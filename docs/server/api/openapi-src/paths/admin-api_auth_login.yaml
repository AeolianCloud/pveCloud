  /admin-api/auth/login:
    post:
      tags:
        - admin-auth
      summary: 管理员登录
      operationId: postAdminAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "400":
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 管理员账号或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: 登录失败次数过多，暂时限制重试
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
