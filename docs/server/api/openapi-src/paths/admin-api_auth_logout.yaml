  /admin-api/auth/logout:
    post:
      tags:
        - admin-auth
      summary: 退出当前管理员会话
      operationId: postAdminAuthLogout
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          description: 当前会话已吊销
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "401":
          description: 未登录、token 无效、token 已吊销或 token 过期
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
