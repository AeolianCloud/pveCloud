  /admin-api/auth/captcha:
    get:
      tags:
        - admin-auth
      summary: 获取管理员登录验证码
      operationId: getAdminAuthCaptcha
      responses:
        "200":
          description: 验证码生成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginCaptchaResponse"
        "429":
          description: 验证码获取过于频繁
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
