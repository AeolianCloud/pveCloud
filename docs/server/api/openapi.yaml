openapi: 3.1.0
info:
  title: pveCloud API
  version: 0.1.0
  description: pveCloud 用户端和管理端 API 规范。业务流程、事务和补偿策略以 docs/server/ 下对应设计文档为准。
servers:
  - url: http://localhost:8080
tags:
  - name: system
    description: 系统检查接口
  - name: admin-auth
    description: 管理端认证接口
paths:
  /healthz:
    get:
      tags:
        - system
      summary: 服务健康检查
      operationId: getHealthz
      responses:
        "200":
          description: 服务和数据库可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          description: 服务或数据库不可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /openapi.yaml:
    get:
      tags:
        - system
      summary: OpenAPI 规范文件
      operationId: getOpenAPIYaml
      responses:
        "200":
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string
  /api/ping:
    get:
      tags:
        - system
      summary: 用户端 API 入口检查
      operationId: getApiPing
      responses:
        "200":
          description: 用户端 API 可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
  /admin-api/ping:
    get:
      tags:
        - system
      summary: 管理端 API 入口检查
      operationId: getAdminApiPing
      responses:
        "200":
          description: 管理端 API 可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
  /admin-api/auth/login:
    post:
      tags:
        - admin-auth
      summary: 管理员登录
      operationId: postAdminAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "400":
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 管理员账号或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ResponseEnvelope:
      type: object
      required:
        - code
        - message
        - data
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: 成功
        data:
          nullable: true
    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          properties:
            code:
              type: integer
              example: 50001
            message:
              type: string
              example: 系统内部错误
            data:
              nullable: true
    HealthResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          properties:
            data:
              type: object
              required:
                - app
                - env
                - database
                - time
              properties:
                app:
                  type: string
                  example: pveCloud
                env:
                  type: string
                  example: local
                database:
                  type: string
                  example: 正常
                time:
                  type: string
                  format: date-time
    PingResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          properties:
            data:
              type: object
              required:
                - scope
                - pong
              properties:
                scope:
                  type: string
                  enum:
                    - api
                    - admin-api
                pong:
                  type: boolean
                  example: true
    AdminLoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 191
          description: 管理员用户名或邮箱
          example: admin
        password:
          type: string
          minLength: 8
          maxLength: 72
          description: 管理员密码
          example: change_me_password
    AdminSummary:
      type: object
      required:
        - id
        - username
        - display_name
        - status
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: admin
        email:
          type: string
          nullable: true
          example: admin@example.com
        display_name:
          type: string
          example: 超级管理员
        status:
          type: string
          example: active
    AdminLoginData:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
        - admin
        - role_ids
        - permission_codes
      properties:
        access_token:
          type: string
          description: 管理端 JWT
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: token 有效秒数
          example: 28800
        admin:
          $ref: "#/components/schemas/AdminSummary"
        role_ids:
          type: array
          items:
            type: integer
            format: int64
          example:
            - 1
        permission_codes:
          type: array
          items:
            type: string
          example:
            - dashboard:view
            - user:view
    AdminLoginResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AdminLoginData"
