    AdminDashboardResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AdminDashboardData"
    AdminLoginCaptchaData:
      type: object
      required:
        - captcha_id
        - image
        - expires_in
      properties:
        captcha_id:
          type: string
          description: 验证码标识，提交登录时原样传入 captcha_id
